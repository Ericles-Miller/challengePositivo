services:
  api:
    build: .
    container_name: challenge-api
    restart: always
    ports:
      - ${PORT:-3000}:3000
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - mongo

  mongo:
    image: mongo
    restart: always
    ports:
      - ${MONGO_PORT:-27017}:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}